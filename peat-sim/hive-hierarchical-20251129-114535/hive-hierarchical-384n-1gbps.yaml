# Lab 4: Hierarchical PEAT CRDT - lab4-hierarchical-384n-1gbps
# Target nodes: 384, Actual: 447
# Structure: 3 companies × 4 platoons × 4 squads × 8 soldiers
# Bandwidth: 1gbps

name: lab4-hierarchical-384n-1gbps

mgmt:
  network: lab4-hierarchical-384n-1gbps
  ipv4-subnet: 172.30.0.0/20
  ipv6-subnet: 3fff:172:30::/52

topology:
  nodes:

    # ===== COMPANY 1 =====

    company-1-commander:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-1-commander
