name: traditional-battalion-192node

# Battalion 1: 192 nodes
# Independent topology with dedicated management network

mgmt:
  network: battalion-1-net
  ipv4-subnet: 172.21.0.0/16
  ipv6-subnet: 3fff:172:21::/48

topology:
  nodes:
    battalion-1-hq:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: battalion-1-hq
        ROLE: battalion_commander
        PLATFORM_TYPE: soldier
        MODE: writer
        TCP_LISTEN: '12345'
        USE_TRADITIONAL: 'true'
        UPDATE_FREQUENCY_SECS: '0.5'
    b1-soldier-1:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: b1-soldier-1
        ROLE: soldier
        PLATFORM_TYPE: soldier
        MODE: reader
        TCP_CONNECT: battalion-1-hq:12345
        USE_TRADITIONAL: 'true'
        UPDATE_FREQUENCY_SECS: '0.5'
    b1-soldier-2:
      kind: linux
      image: peat-sim-node:latest
