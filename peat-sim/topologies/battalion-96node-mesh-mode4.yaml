# MODE 4 (CAP Hierarchical P2P Mesh): 96-Node Battalion with Hierarchical Aggregation
# ContainerLab Topology: 96-Node Battalion - P2P Mesh Mode
#
# Purpose: Mode 4 - Three-level hierarchical aggregation (Squad → Platoon → Battalion)
# Architecture: Three-level P2P mesh - squad mesh + platoon mesh + battalion mesh
# Scale: 96 nodes
#
# Structure:
#   Battalion HQ (1) - Aggregates 8 PlatoonSummaries → 1 BattalionSummary
#   ├── Platoon 1 Leader - Aggregates 2 SquadSummaries → 1 PlatoonSummary
#   │   ├── Squad 1A Leader (1) + 4 members
#   │   └── Squad 1B Leader (1) + 4 members
#   ├── Platoon 2 Leader - Aggregates 2 SquadSummaries → 1 PlatoonSummary
#   │   ├── Squad 2A Leader (1) + 4 members
#   │   └── Squad 2B Leader (1) + 4 members
#   ├── Platoon 3 Leader - Aggregates 2 SquadSummaries → 1 PlatoonSummary
#   │   ├── Squad 3A Leader (1) + 4 members
#   │   └── Squad 3B Leader (1) + 4 members
#   ├── Platoon 4 Leader - Aggregates 2 SquadSummaries → 1 PlatoonSummary
#   │   ├── Squad 4A Leader (1) + 4 members
#   │   └── Squad 4B Leader (1) + 4 members
#   ├── Platoon 5 Leader - Aggregates 2 SquadSummaries → 1 PlatoonSummary
#   │   ├── Squad 5A Leader (1) + 4 members
#   │   └── Squad 5B Leader (1) + 4 members
#   ├── Platoon 6 Leader - Aggregates 2 SquadSummaries → 1 PlatoonSummary
#   │   ├── Squad 6A Leader (1) + 4 members
#   │   └── Squad 6B Leader (1) + 5 members
#   ├── Platoon 7 Leader - Aggregates 2 SquadSummaries → 1 PlatoonSummary
#   │   ├── Squad 7A Leader (1) + 5 members
#   │   └── Squad 7B Leader (1) + 5 members
#   └── Platoon 8 Leader - Aggregates 2 SquadSummaries → 1 PlatoonSummary
#       ├── Squad 8A Leader (1) + 5 members
#       └── Squad 8B Leader (1) + 5 members
#   Total: 1 battalion HQ + 8 platoon leaders + 16 squad leaders + 71 members = 96 nodes

name: cap-battalion-96node-mode4-mesh

topology:
  nodes:
    # Battalion HQ - aggregates platoon summaries
    battalion-hq:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: battalion-hq
        ROLE: battalion_commander
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        BATTALION_ID: "battalion-1"
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        TCP_CONNECT: "platoon-1-leader:12346,platoon-2-leader:12347,platoon-3-leader:12348,platoon-4-leader:12349,platoon-5-leader:12350,platoon-6-leader:12351,platoon-7-leader:12352,platoon-8-leader:12353"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
        CAP_FILTER_ENABLED: "true"
      ports:
        - "12345:12345"

    # Platoon 1 Leader
    platoon-1-leader:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: platoon-1-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        PLATOON_ID: "platoon-1"
        TCP_LISTEN: "12346"
        TCP_CONNECT: "battalion-hq:12345,platoon-2-leader:12347,platoon-3-leader:12348,platoon-4-leader:12349,platoon-5-leader:12350,platoon-6-leader:12351,platoon-7-leader:12352,platoon-8-leader:12353,squad-1A-leader:12347,squad-1B-leader:12348"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
        CAP_FILTER_ENABLED: "true"

    # Squad 1A Leader
