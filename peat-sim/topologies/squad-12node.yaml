        MODE: reader  # Waits for document sync
        TCP_LISTEN: "12356"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

  # ============================================
  # NETWORK TOPOLOGY
  # ============================================
  # All nodes connect via ContainerLab's management network (eth0)
  # This creates a shared L2 domain for all nodes
  # Network impairments will be applied post-deployment via 'containerlab tools netem'
  #
  # Planned Constraints (to be applied manually):
  # - Soldier mesh: 100 Kbps, 100ms, 1% loss (via eth0)
  # - UGV relay: 1 Mbps, 50ms, 0.5% loss
  # - UAV aerial: 56 Kbps, 500ms, 5% loss
  # - UGV-UAV: 100 Kbps, 200ms, 2% loss
