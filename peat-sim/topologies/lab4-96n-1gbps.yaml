# Lab 4: Hierarchical Peat CRDT - lab4-96n
# Target nodes: 96, Actual: 101
# Structure: 1 companies × 4 platoons × 3 squads × 7 soldiers
# Bandwidth: 1gbps

name: lab4-96n

mgmt:
  network: lab4-96n
  ipv4-subnet: 172.20.20.0/24

topology:
  nodes:

    # ===== COMPANY 1 =====

    company-1-commander:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-1-commander
        ROLE: company_commander
        PLATFORM_TYPE: soldier
        NODE_TYPE: company_commander
        MODE: hierarchical
        BACKEND: ${BACKEND}
        COMPANY_ID: company-1
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        PEAT_APP_ID: ${PEAT_APP_ID}
        PEAT_OFFLINE_TOKEN: ${PEAT_OFFLINE_TOKEN}
        PEAT_SHARED_KEY: ${PEAT_SHARED_KEY}
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"

    # ----- Platoon 1-1 -----

    company-1-platoon-1-leader:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-1-platoon-1-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: platoon_leader
        MODE: hierarchical
        BACKEND: ${BACKEND}
        PLATOON_ID: company-1-platoon-1
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12346"
        TCP_CONNECT: "clab-lab4-96n-company-1-commander:12345"
        PEAT_APP_ID: ${PEAT_APP_ID}
        PEAT_OFFLINE_TOKEN: ${PEAT_OFFLINE_TOKEN}
        PEAT_SHARED_KEY: ${PEAT_SHARED_KEY}
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"

