# ContainerLab Topology: 48-Node Battalion - CAP Hierarchical (Mode 4)
# Architecture: Hierarchical with aggregation
# CRDT: Yes (Ditto) | Hierarchy: Yes | Aggregation: Yes (Mode 4)
#
# Structure:
#   Battalion HQ (1) - Aggregates 4 PlatoonSummaries → 1 BattalionSummary
#   ├── Platoon Leaders (4) - Each aggregates 12 NodeStates → 1 PlatoonSummary
#   └── Soldiers (48) - Each reports NodeState
#
# Expected ops: 48 NodeStates + 4 PlatoonSummaries + 1 BattalionSummary = 53 total

name: cap-battalion-48node-mode4

topology:
  nodes:
    battalion-hq:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: battalion-hq
        ROLE: battalion_commander
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        BATTALION_ID: "battalion-1"
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
        CAP_FILTER_ENABLED: "true"
      ports:
        - "12345:12345"

    platoon-1-leader:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: platoon-1-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        PLATOON_ID: "platoon-1"
        TCP_LISTEN: "12346"
        TCP_CONNECT: "battalion-hq:12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
        CAP_FILTER_ENABLED: "true"

