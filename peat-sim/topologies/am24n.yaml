# Lab 4: Hierarchical PEAT CRDT - am24n
# Target nodes: 24, Actual: 26
# Structure: 1 companies × 1 platoons × 3 squads × 7 soldiers
# Bandwidth: 1gbps

name: am24n

mgmt:
  network: am24n
  ipv4-subnet: 172.20.20.0/24
  ipv6-subnet: 3fff:172:20:20::/64

topology:
  nodes:

    # ===== COMPANY 1 =====

    company-1-commander:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-1-commander
        ROLE: company_commander
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        BACKEND: automerge
        COMPANY_ID: company-1
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        DITTO_APP_ID: test-formation
        PEAT_SECRET_KEY: aGl2ZS10ZXN0LWZvcm1hdGlvbi1zZWNyZXQta2V5LTA=
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"

    # ----- Platoon 1-1 -----

    company-1-platoon-1-leader:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-1-platoon-1-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        BACKEND: automerge
        PLATOON_ID: company-1-platoon-1
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12346"
        TCP_CONNECT: "company-1-commander|clab-am24n-company-1-commander:12345"
        DITTO_APP_ID: test-formation
        PEAT_SECRET_KEY: aGl2ZS10ZXN0LWZvcm1hdGlvbi1zZWNyZXQta2V5LTA=
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"

