# Lab 4: Hierarchical PEAT CRDT - lab4-48n
# Target nodes: 48, Actual: 51
# Structure: 1 companies × 2 platoons × 3 squads × 7 soldiers
# Bandwidth: 1gbps
# Backend: Set BACKEND env var at deploy time (ditto or automerge)

name: lab4-48n

mgmt:
  network: lab4-48n
  ipv4-subnet: 172.20.20.0/24

topology:
  defaults:
    binds:
      # Mount shared logs directory for persistent metrics collection
      - /work/peat-sim-results/lab4-48n-1gbps:/data/logs

  nodes:

    # Lab Orchestrator - deployed first, other nodes register with it
    # Topology file is bind-mounted for node name validation
    orchestrator:
      kind: linux
      image: peat-sim-node:latest
      ports:
        - 8080:8080
      binds:
        - /tmp/lab4-48n.yaml:/topology.yaml:ro
      entrypoint: /usr/local/bin/lab-orchestrator
      cmd: --topology /topology.yaml --port 8080

    # ===== COMPANY 1 =====

    company-1-commander:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-1-commander
        ROLE: company_commander
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        BACKEND: ${BACKEND}
        COMPANY_ID: company-1
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        TCP_CONNECT: "company-1-platoon-1-leader|company-1-platoon-1-leader:12346,company-1-platoon-2-leader|company-1-platoon-2-leader:12371"
        PEAT_APP_ID: ${PEAT_APP_ID}
        PEAT_OFFLINE_TOKEN: ${PEAT_OFFLINE_TOKEN}
        PEAT_SECRET_KEY: ${PEAT_SECRET_KEY}
        ORCHESTRATOR_URL: http://orchestrator:8080
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"

    # ----- Platoon 1-1 -----

    company-1-platoon-1-leader:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-1-platoon-1-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        BACKEND: ${BACKEND}
        PLATOON_ID: company-1-platoon-1
        SQUAD_IDS: "company-1-platoon-1-squad-1,company-1-platoon-1-squad-2,company-1-platoon-1-squad-3"
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12346"
        TCP_CONNECT: "company-1-commander|company-1-commander:12345,company-1-platoon-1-squad-1-leader|company-1-platoon-1-squad-1-leader:12347,company-1-platoon-1-squad-2-leader|company-1-platoon-1-squad-2-leader:12355,company-1-platoon-1-squad-3-leader|company-1-platoon-1-squad-3-leader:12363"
        PEAT_APP_ID: ${PEAT_APP_ID}
        PEAT_OFFLINE_TOKEN: ${PEAT_OFFLINE_TOKEN}
        PEAT_SECRET_KEY: ${PEAT_SECRET_KEY}
        ORCHESTRATOR_URL: http://orchestrator:8080
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"

