# ContainerLab Topology: 24-Node Platoon - Hybrid Mode (NEW)
#
# Purpose: Phase 3A - Intra-squad mesh + inter-squad hierarchical
# Architecture: Best of both worlds
#   - Within squads: Full peer-to-peer mesh (resilience)
#   - Between squads: Hierarchical via squad leaders (efficiency)
# Scale: 2× squad (12 → 24 nodes)
#
# Structure:
#   Platoon Leader ↔ 3 Squad Leaders (hierarchical)
#   Squad Alpha: 7 members in full mesh
#   Squad Bravo: 8 members in full mesh
#   Squad Charlie: 8 members in full mesh
#
# Network Topology:
#   - Platoon Leader connects to 3 squad leaders
#   - Each squad leader connects to platoon leader + all squad members
#   - Squad members connect to all members in their squad (mesh)
#   - NO direct cross-squad connections (except via squad leaders)

name: cap-platoon-hybrid

topology:
  nodes:
    # Platoon Leader (connects to all squad leaders)
    platoon-leader:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: platoon-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: writer
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        TCP_CONNECT: "platoon-leader:12345,squad-alpha-leader:12346,squad-bravo-leader:12353,squad-charlie-leader:12361"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
        - "12345:12345"

    # ========================================
    # Squad Alpha (7 members in full mesh)
    # ========================================
    squad-alpha-leader:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: squad-alpha-leader
        ROLE: squad_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12346"
        TCP_CONNECT: "platoon-leader:12345,squad-alpha-leader:12346,alpha-soldier-1:12347,alpha-soldier-2:12348,alpha-soldier-3:12349,alpha-soldier-4:12350,alpha-uav-1:12351,alpha-ugv-1:12352"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
