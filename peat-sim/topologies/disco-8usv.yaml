# DiSCO USV Flotilla: 8 autonomous surface vehicles
# 1 leader + 7 patrol boats in box perimeter pattern
# Joins the same Peat mesh as company-ALPHA via shared credentials
# Publishes as cell company-CHARLIE in ATAK

name: disco-8usv

mgmt:
  network: disco-8usv
  ipv4-subnet: 172.20.21.0/24

topology:
  nodes:

    # ===== DiSCO FLOTILLA (CHARLIE) =====

    company-CHARLIE-disco-leader:
      kind: linux
      image: peat-sim-node:latest
      ports:
        - 12500:12500/udp
      env:
        NODE_ID: company-CHARLIE-disco-leader
        ROLE: company_commander
        PLATFORM_TYPE: usv
        NODE_TYPE: usv
        MODE: hierarchical
        BACKEND: ${BACKEND}
        CAP_IN_MEMORY: "${CAP_IN_MEMORY:-false}"
        COMPANY_ID: company-CHARLIE
        COMPANY_DISPLAY_NAME: "CHARLIE (DiSCO)"
        PLATOONS_PER_COMPANY: "1"
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12500"
        TCP_CONNECT: "company-CHARLIE-platoon-1-leader|company-CHARLIE-platoon-1-leader:12502"
        PEAT_APP_ID: default-formation
        PEAT_SHARED_KEY: 2Df7UyLyBgAphJ2RXnbdBCoXWbqRAu8Quwi7J3K+hBU=
        DEMO_CENTER_LAT: "32.6723"
        DEMO_CENTER_LON: "-117.2425"

    company-CHARLIE-platoon-1-leader:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-CHARLIE-platoon-1-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: usv
        NODE_TYPE: usv
        MODE: hierarchical
        BACKEND: ${BACKEND}
        CAP_IN_MEMORY: "${CAP_IN_MEMORY:-false}"
        PLATOON_ID: company-CHARLIE-platoon-1
        SQUAD_IDS: "company-CHARLIE-platoon-1-disco-squad"
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12502"
        TCP_CONNECT: "company-CHARLIE-disco-leader|company-CHARLIE-disco-leader:12500,company-CHARLIE-disco-squad-leader|company-CHARLIE-disco-squad-leader:12501"
        PEAT_APP_ID: default-formation
        PEAT_SHARED_KEY: 2Df7UyLyBgAphJ2RXnbdBCoXWbqRAu8Quwi7J3K+hBU=
        DEMO_CENTER_LAT: "32.6723"
        DEMO_CENTER_LON: "-117.2425"

    company-CHARLIE-disco-squad-leader:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-CHARLIE-disco-squad-leader
        ROLE: squad_leader
        PLATFORM_TYPE: usv
        NODE_TYPE: usv
        MODE: hierarchical
        BACKEND: ${BACKEND}
        CAP_IN_MEMORY: "${CAP_IN_MEMORY:-false}"
        SQUAD_ID: company-CHARLIE-platoon-1-disco-squad
        SQUAD_MEMBERS: "company-CHARLIE-disco-1,company-CHARLIE-disco-2,company-CHARLIE-disco-3,company-CHARLIE-disco-4,company-CHARLIE-disco-5,company-CHARLIE-disco-6,company-CHARLIE-disco-7"
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12501"
        TCP_CONNECT: "company-CHARLIE-platoon-1-leader|company-CHARLIE-platoon-1-leader:12502,company-CHARLIE-disco-1|company-CHARLIE-disco-1:12510,company-CHARLIE-disco-2|company-CHARLIE-disco-2:12511,company-CHARLIE-disco-3|company-CHARLIE-disco-3:12512,company-CHARLIE-disco-4|company-CHARLIE-disco-4:12513,company-CHARLIE-disco-5|company-CHARLIE-disco-5:12514,company-CHARLIE-disco-6|company-CHARLIE-disco-6:12515,company-CHARLIE-disco-7|company-CHARLIE-disco-7:12516"
        PEAT_APP_ID: default-formation
        PEAT_SHARED_KEY: 2Df7UyLyBgAphJ2RXnbdBCoXWbqRAu8Quwi7J3K+hBU=
        DEMO_CENTER_LAT: "32.6723"
        DEMO_CENTER_LON: "-117.2425"

    # ----- DiSCO Patrol Boats -----

    company-CHARLIE-disco-1:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-CHARLIE-disco-1
        ROLE: soldier
        PLATFORM_TYPE: usv
        NODE_TYPE: usv
        MODE: hierarchical
        BACKEND: ${BACKEND}
        CAP_IN_MEMORY: "${CAP_IN_MEMORY:-false}"
        SQUAD_ID: company-CHARLIE-platoon-1-disco-squad
        UPDATE_RATE_MS: "3000"
        TCP_LISTEN: "12510"
        TCP_CONNECT: "company-CHARLIE-disco-squad-leader|company-CHARLIE-disco-squad-leader:12501"
        PEAT_APP_ID: default-formation
        PEAT_SHARED_KEY: 2Df7UyLyBgAphJ2RXnbdBCoXWbqRAu8Quwi7J3K+hBU=
        USV_INDEX: "0"
        USV_TOTAL: "7"
        DEMO_CENTER_LAT: "32.6723"
