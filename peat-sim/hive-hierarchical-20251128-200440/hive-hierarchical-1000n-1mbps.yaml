# Lab 4: Hierarchical PEAT CRDT - lab4-hierarchical-1000n-1mbps
# Target nodes: 1000, Actual: 1192
# Structure: 8 companies × 4 platoons × 4 squads × 8 soldiers
# Bandwidth: 1mbps

name: lab4-hierarchical-1000n-1mbps

mgmt:
  network: lab4-hierarchical-1000n-1mbps
  ipv4-subnet: 172.30.0.0/20
  ipv6-subnet: 3fff:172:30::/52

topology:
  nodes:

    # ===== COMPANY 1 =====

    company-1-commander:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: company-1-commander
        ROLE: company_commander
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        COMPANY_ID: company-1
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

