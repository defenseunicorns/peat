name: peat-flat-mesh-10n-1gbps
topology:
  nodes:
    peer-1:
      kind: linux
      image: peat-sim-node:latest
      env:
        NODE_ID: peer-1
        ROLE: squad_member
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: flat_mesh
        SQUAD_ID: flat-mesh
        TCP_LISTEN: '12346'
        TCP_CONNECT: peer-2:12347,peer-3:12348,peer-4:12349,peer-5:12350,peer-6:12351,peer-7:12352,peer-8:12353,peer-9:12354,peer-10:12355
        UPDATE_RATE_MS: '5000'
        BANDWIDTH: 1gbps
        BACKEND: ditto
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
