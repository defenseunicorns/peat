[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64 && apt-get update && apt-get install -y libdbus-1-dev:arm64 pkg-config clang curl unzip",
    "curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip && unzip protoc-25.1-linux-x86_64.zip -d /usr/local && rm protoc-25.1-linux-x86_64.zip"
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig", "PKG_CONFIG_ALLOW_CROSS=1", "CXXFLAGS"]
