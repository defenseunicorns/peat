# Lab 4 Backend Comparison Configuration Matrix
#
# This file defines the test matrix for comparing Ditto and Automerge backends.
# Use with run-lab4-comparison.sh to execute specific or all combinations.

# Available backends for Lab 4 hierarchical topology testing
backends:
  - ditto
  - automerge

# Node count configurations
# Each generates a hierarchical topology with:
#   24:  1 platoon, 3 squads, 7 soldiers = 25 total
#   48:  2 platoons, 3 squads, 7 soldiers = 50 total
#   96:  4 platoons, 3 squads, 7 soldiers = 100 total
#   384: 3 companies, 4 platoons, 4 squads, 8 soldiers = 447 total
node_counts:
  - 24
  - 48
  - 96
  - 384

# Bandwidth constraints to test
# These are applied via containerlab netem tools
bandwidths:
  - 1gbps
  - 100mbps
  - 1mbps
  - 256kbps

# Test duration in seconds (per configuration)
test_duration_secs: 120

# Results directory base path
results_base_dir: /work/hive-sim-results

# Optional: filter specific combinations
filter:
  # Only run these combinations if specified (empty = run all)
  include: []

  # Skip these combinations (backend, nodes, bandwidth)
  exclude:
    # 1000n tests are unreliable on single machine
    - backend: ditto
      nodes: 1000
    - backend: automerge
      nodes: 1000

# Pre-flight checks configuration
preflight:
  # Docker image that must exist
  required_image: hive-sim-node:latest

  # Minimum free disk space in GB
  min_disk_space_gb: 10

  # Clean up stale containers before test
  cleanup_stale_containers: true

# Cleanup configuration
cleanup:
  # Remove topology after each test
  destroy_topology: true

  # Remove orphaned Docker networks
  prune_networks: true

  # Prune dangling images (careful - may remove cached layers)
  prune_images: false
