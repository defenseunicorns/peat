# Lab 4: Hierarchical HIVE CRDT - am384n
# Target nodes: 384, Actual: 447
# Structure: 3 companies × 4 platoons × 4 squads × 8 soldiers
# Bandwidth: 1000000000

name: am384n

mgmt:
  network: am384n
  ipv4-subnet: 172.30.0.0/20

topology:
  nodes:

    # ===== COMPANY 1 =====

    company-1-commander:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: company-1-commander
        ROLE: company_commander
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        BACKEND: automerge
        COMPANY_ID: company-1
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        HIVE_APP_ID: ${HIVE_APP_ID}
        HIVE_OFFLINE_TOKEN: ${HIVE_OFFLINE_TOKEN}
        HIVE_SHARED_KEY: ${HIVE_SHARED_KEY}
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"
        WAIT_FOR_START: "true"

    # ----- Platoon 1-1 -----

    company-1-platoon-1-leader:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: company-1-platoon-1-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        BACKEND: automerge
        PLATOON_ID: company-1-platoon-1
        SQUAD_IDS: "company-1-platoon-1-squad-1,company-1-platoon-1-squad-2,company-1-platoon-1-squad-3,company-1-platoon-1-squad-4"
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12346"
        TCP_CONNECT: "company-1-commander|clab-am384n-company-1-commander:12345"
        HIVE_APP_ID: ${HIVE_APP_ID}
        HIVE_OFFLINE_TOKEN: ${HIVE_OFFLINE_TOKEN}
        HIVE_SHARED_KEY: ${HIVE_SHARED_KEY}
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"
        WAIT_FOR_START: "true"

