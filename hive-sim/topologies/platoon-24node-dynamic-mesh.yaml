# ContainerLab Topology: 24-Node Platoon - Dynamic Mesh Mode
#
# Purpose: Phase 3A - Full peer-to-peer mesh (maximum connectivity)
# Architecture: All nodes configured with all peer endpoints (24×23 potential connections)
# Scale: 2× squad (12 → 24 nodes)
#
# Structure:
#   Every node connects to all 23 other nodes
#   Total potential connections: 276 (n×(n-1)/2 where n=24)
#
# Network: Full peer-to-peer mesh, Ditto manages actual connectivity

name: cap-platoon-dynamic-mesh

topology:
  nodes:
    platoon-leader:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: platoon-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: writer
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
