# ContainerLab Topology: 2-Node POC
#
# Purpose: Validate ContainerLab approach for E8 network simulation
# Tests:
#   1. Container-based Ditto sync
#   2. Network constraints (bandwidth, latency, packet loss)
#   3. Basic connectivity and metrics collection
#
# Usage:
#   containerlab deploy -t hive-sim/topologies/poc-2node.yaml
#   containerlab inspect -t hive-sim/topologies/poc-2node.yaml
#   containerlab destroy -t hive-sim/topologies/poc-2node.yaml

name: cap-poc-2node

topology:
  nodes:
    # node1: Writer (creates document)
    node1:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: node1
        MODE: writer
        TCP_LISTEN: "12345"
        # Ditto credentials - replace with your values from https://portal.ditto.live/
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
        - "12345:12345"  # Expose for debugging

    # node2: Reader (receives document)
    node2:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: node2
        MODE: reader
        # Connect to node1 using containerlab's internal networking
        # ContainerLab creates a management network and assigns IPs
        # We'll use the node name which resolves via DNS
        TCP_CONNECT: "node1:12345"
        # Ditto credentials
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

  links:
    # Direct link between node1 and node2
    # Start with no constraints to validate basic connectivity
    - endpoints: ["node1:eth1", "node2:eth1"]
