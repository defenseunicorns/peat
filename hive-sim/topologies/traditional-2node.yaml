# ContainerLab Topology: 2-Node Traditional IoT Baseline
#
# Purpose: Traditional IoT architecture comparison (NO CRDT, periodic full messages)
# Architecture: Event-driven periodic state transmission
# Comparison: Establishes baseline for CRDT overhead measurement
#
# Usage:
#   containerlab deploy -t hive-sim/topologies/traditional-2node.yaml
#   containerlab inspect -t hive-sim/topologies/traditional-2node.yaml
#   containerlab destroy -t hive-sim/topologies/traditional-2node.yaml
#
# Key Differences from CAP Protocol:
#   - NO CRDT delta sync
#   - Full state messages every UPDATE_FREQUENCY_SECS
#   - Last-write-wins (no merge semantics)
#   - Simple TCP client-server

name: traditional-baseline-2node

topology:
  nodes:
    # node1: Server (writer - creates documents)
    node1:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: node1
        MODE: writer
        TCP_LISTEN: "12345"
        # Traditional baseline configuration
        USE_TRADITIONAL: "true"
        UPDATE_FREQUENCY_SECS: "5"  # Periodic transmission every 5 seconds
        NODE_TYPE: server
        # Ditto credentials (not used by traditional baseline, but required by entrypoint)
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
        - "12345:12345"  # Expose for debugging

    # node2: Client (reader - receives documents)
    node2:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: node2
        MODE: reader
        TCP_CONNECT: "node1:12345"
        # Traditional baseline configuration
        USE_TRADITIONAL: "true"
        UPDATE_FREQUENCY_SECS: "5"  # Match server frequency
        NODE_TYPE: client
        # Ditto credentials
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

  links:
    # Direct link between node1 and node2
    # Start with no constraints for baseline testing
    - endpoints: ["node1:eth1", "node2:eth1"]
