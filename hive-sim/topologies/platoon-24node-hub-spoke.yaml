# ContainerLab Topology: 24-Node Platoon - Hub-Spoke (Hierarchical) Mode
#
# Purpose: Phase 3A - First multi-squad hierarchical aggregation test
# Architecture: Squad members → Squad Leaders → Platoon Leader (3-tier hierarchy)
# Scale: 2× squad (12 → 24 nodes)
#
# Structure:
#   Platoon Leader (1)
#   ├── Squad Alpha Leader (1) + 6 members = 7 nodes
#   ├── Squad Bravo Leader (1) + 6 members = 7 nodes
#   └── Squad Charlie Leader (1) + 6 members = 7 nodes
#   Total: 1 platoon leader + 3 squad leaders + 20 members = 24 nodes
#
# Network Hierarchy:
#   platoon-leader (top, listens 12345)
#     ├─ squad-alpha-leader (listens 12346) → platoon-leader
#     │   └─ 6 alpha members → squad-alpha-leader
#     ├─ squad-bravo-leader (listens 12353) → platoon-leader
#     │   └─ 6 bravo members → squad-bravo-leader
#     └─ squad-charlie-leader (listens 12360) → platoon-leader
#         └─ 6 charlie members → squad-charlie-leader

name: cap-platoon-hub-spoke

topology:
  nodes:
    # Platoon Leader (top of hierarchy)
    platoon-leader:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: platoon-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: writer
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
        - "12345:12345"

    # ========================================
    # Squad Alpha (7 members)
    # ========================================
    squad-alpha-leader:
