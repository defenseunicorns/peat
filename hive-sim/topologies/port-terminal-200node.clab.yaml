# Port Terminal 200-Node Topology — Phase 3 (ADR-051)
# Full terminal operation: TOC + 2 berths + yard + gate = 200 nodes
#
# Zone breakdown:
#   TOC:   1 node  (fiber backbone)
#   Berth: 2 × 57 = 114 nodes (industrial WiFi — 50 Mbps, 15ms, 2% loss)
#   Yard:  53 nodes (cellular/WiFi — 100 Mbps, 10ms, 1% loss)
#   Gate:  32 nodes (wired backbone — 1 Gbps, 2ms, 0.1% loss)
#
# Deploy:  containerlab deploy -t port-terminal-200node.clab.yaml
# Destroy: containerlab destroy -t port-terminal-200node.clab.yaml
# Impairments: ./apply-port-terminal-impairments.sh port-terminal-200n

name: port-terminal-200n

mgmt:
  network: port-terminal-200n
  ipv4-subnet: 172.20.200.0/24

topology:
  nodes:

    # ══════════════════════════════════════════════════
    # TOC — Terminal Operations Center (top-level aggregation)
    # ══════════════════════════════════════════════════

    toc:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: toc
        ROLE: toc
        PLATFORM_TYPE: controller
        NODE_TYPE: toc
        ZONE: toc
        MODE: hierarchical
        BACKEND: ${BACKEND:-automerge}
        CAP_IN_MEMORY: "${CAP_IN_MEMORY:-false}"
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        HIVE_APP_ID: ${HIVE_APP_ID}
        HIVE_SECRET_KEY: ${HIVE_SECRET_KEY}
        HIVE_OFFLINE_TOKEN: ${HIVE_OFFLINE_TOKEN}
        HIVE_SHARED_KEY: ${HIVE_SHARED_KEY}
        EVENT_ROUTING_ENABLED: "true"
        AGGREGATION_WINDOW_MS: "1000"
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"

    # ══════════════════════════════════════════════════
    # BERTH 1 — Quayside operations (~57 nodes)
    # Impairment: Industrial WiFi — 50 Mbps, 15ms, 2% loss
    # ══════════════════════════════════════════════════

