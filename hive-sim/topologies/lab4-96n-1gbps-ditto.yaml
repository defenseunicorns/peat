# Lab 4: Hierarchical HIVE CRDT - lab4-96n
# Target nodes: 96, Actual: 101
# Structure: 1 companies × 4 platoons × 3 squads × 7 soldiers
# Bandwidth: 1gbps

name: lab4-96n

mgmt:
  network: lab4-96n
  ipv4-subnet: 172.20.20.0/24

topology:
  nodes:

    # ===== COMPANY 1 =====

    company-1-commander:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: company-1-commander
        ROLE: company_commander
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        BACKEND: ditto
        COMPANY_ID: company-1
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"

