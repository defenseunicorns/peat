# ContainerLab Topology: 58-Node Port Berth Operation (Phase 2)
#
# Purpose: Simulate a full berth operation with 3 hold teams working
# simultaneously on a container vessel, coordinated by a berth manager.
#
# Structure (58 nodes total):
#   3 Hold Teams (14 nodes each = 42):
#     - 2 cranes (gantry crane operators)
#     - 3 workers (stevedores / cargo handlers)
#     - 1 lasher (container lashing crew)
#     - 1 signaler (crane signaler / ground coordinator)
#     - 4 tractors (hold-assigned terminal tractors)
#     - 2 sensors (weight scale + temperature monitor)
#     - 1 aggregator (hold-level data aggregation)
#   Shared Resources (16 nodes):
#     - 1 berth manager (coordinates all holds)
#     - 8 shared tractors (inter-hold / yard transport pool)
#     - 4 yard blocks (container stacking areas)
#     - 1 AI scheduler (optimization / dispatch)
#     - 2 safety officers (wharf safety / watchstanders)
#
# Network Impairments (per ADR-051 §Phase 2):
#   Crane-to-crane:    5ms delay,  0.1% loss, 10 Mbps (industrial Ethernet)
#   Worker WiFi:       15ms delay, 1% loss,   1 Mbps  (enterprise WiFi)
#   Worker BLE mesh:   20ms delay, 2% loss,   500 Kbps (Bluetooth LE mesh)
#   Tractor cellular:  50ms delay, 0.5% loss, 2 Mbps  (private LTE/5G)
#   Sensors wired:     1ms delay,  0% loss,   100 Mbps (hardwired Ethernet)
#   Cross-hold links:  10ms delay, 0.1% loss, 10 Mbps (via berth manager)
#
# Impairments are applied via NETEM_DELAY, NETEM_LOSS, NETEM_RATE env vars
# in the entrypoint, using tc qdisc on eth0.
#
# Usage:
#   containerlab deploy -t hive-sim/topologies/port-berth-operation-58node.yaml --env-file .env
#   containerlab inspect -t hive-sim/topologies/port-berth-operation-58node.yaml
#   containerlab destroy -t hive-sim/topologies/port-berth-operation-58node.yaml --cleanup

name: port-berth-58n

mgmt:
  network: port-berth-58n
  ipv4-subnet: 172.20.58.0/24

topology:
  nodes:

    # ==============================================================================
    # BERTH MANAGER — Top-level coordinator for all hold operations
    # ==============================================================================
    berth-mgr:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: berth-mgr
        ROLE: berth_manager
        PLATFORM_TYPE: infrastructure
        NODE_TYPE: infrastructure
        MODE: hierarchical
        BACKEND: ${BACKEND:-automerge}
        CAP_IN_MEMORY: "${CAP_IN_MEMORY:-true}"
        HOLD_ID: shared
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        HIVE_APP_ID: ${HIVE_APP_ID}
        HIVE_OFFLINE_TOKEN: ${HIVE_OFFLINE_TOKEN}
        HIVE_SHARED_KEY: ${HIVE_SHARED_KEY}
        NETEM_DELAY: "10ms"
        NETEM_LOSS: "0.1%"
        NETEM_RATE: "10mbit"
        CIRCUIT_FAILURE_THRESHOLD: "3"
        CIRCUIT_FAILURE_WINDOW_SECS: "2"
        CIRCUIT_OPEN_TIMEOUT_SECS: "2"
        CIRCUIT_SUCCESS_THRESHOLD: "2"

