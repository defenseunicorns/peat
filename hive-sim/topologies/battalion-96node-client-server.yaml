# ContainerLab Topology: 96-Node Battalion - CAP Full (No Hierarchy)
# Architecture: All nodes connect to central server (star topology)
# CRDT: Yes (Ditto) | Hierarchy: No | Aggregation: No

name: cap-battalion-96node

topology:
  nodes:
    battalion-hq:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: battalion-hq
        ROLE: battalion_commander
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: writer
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
        - "12345:12345"

    soldier-1:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: soldier-1
        ROLE: rifleman
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_CONNECT: "battalion-hq:12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

