# MODE 4 (CAP Hierarchical P2P Mesh): Hierarchical aggregation with P2P mesh networking
# ContainerLab Topology: 24-Node Platoon - P2P Mesh Mode
#
# Purpose: Mode 4 - Hierarchical aggregation with P2P mesh (95% bandwidth reduction)
# Architecture: Two-level P2P mesh - squad-level mesh + leadership mesh
# Scale: 24 nodes (1 platoon leader + 3 squad leaders + 20 squad members)
#
# Structure:
#   Platoon Leader (1) - Aggregates 3 SquadSummaries → 1 PlatoonSummary
#   ├── Squad Alpha Leader (1) + 6 members - Aggregates 7 NodeStates → 1 SquadSummary
#   ├── Squad Bravo Leader (1) + 7 members - Aggregates 8 NodeStates → 1 SquadSummary
#   └── Squad Charlie Leader (1) + 7 members - Aggregates 8 NodeStates → 1 SquadSummary
#   Total: 1 platoon leader + 3 squad leaders + 20 members = 24 nodes
#   Expected: 27 total ops (24 NodeStates + 3 SquadSummaries) vs 576 in Mode 2
#
# Network Topology:
#   - P2P mesh within each squad (squad members ↔ squad leader ↔ squad members)
#   - P2P mesh at leadership level (platoon leader ↔ all squad leaders)
#   - Event-driven aggregation via Ditto change streams
#
# P2P Mesh Connections:
#   - Platoon leader: connects to all 3 squad leaders
#   - Squad leaders: connect to platoon leader + other squad leaders + all squad members
#   - Squad members: connect to squad leader + all other squad members

name: cap-platoon-mode4-mesh

topology:
  nodes:
    # Platoon Leader - aggregates squad summaries via P2P mesh
    platoon-leader:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: platoon-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: hierarchical
        PLATOON_ID: "platoon-1"
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        TCP_CONNECT: "squad-alpha-leader:12346,squad-bravo-leader:12353,squad-charlie-leader:12361"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
        CAP_FILTER_ENABLED: "true"
