name: traditional-battalion-1000node

# 1000-node topology - testing realistic upper boundary
# IPv6 ENABLED (dual-stack) with kernel tuning
mgmt:
  network: clab
  ipv4-subnet: 172.20.0.0/16
  ipv6-subnet: 3fff:172:20::/48

topology:
  nodes:
    battalion-hq:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: battalion-hq
        ROLE: battalion_commander
        PLATFORM_TYPE: soldier
        MODE: writer
        TCP_LISTEN: '12345'
        USE_TRADITIONAL: 'true'
        UPDATE_FREQUENCY_SECS: '0.5'
    p1-soldier-1:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: p1-soldier-1
        ROLE: soldier
        PLATFORM_TYPE: soldier
        MODE: reader
        TCP_CONNECT: battalion-hq:12345
        USE_TRADITIONAL: 'true'
        UPDATE_FREQUENCY_SECS: '0.5'
    p1-soldier-2:
      kind: linux
      image: hive-sim-node:latest
