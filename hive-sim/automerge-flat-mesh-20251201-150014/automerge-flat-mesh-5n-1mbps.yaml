name: automerge-flat-mesh-5n-1mbps
topology:
  nodes:
    peer-1:
      kind: linux
      image: hive-sim-node:latest
      env:
        NODE_ID: peer-1
        ROLE: squad_member
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: flat_mesh
        SQUAD_ID: flat-mesh
        TCP_LISTEN: '12346'
        TCP_CONNECT: peer-2:12347,peer-3:12348,peer-4:12349,peer-5:12350
        UPDATE_RATE_MS: '5000'
        BANDWIDTH: 1mbps
        BACKEND: automerge
        CAP_DATA_PATH: /data/automerge/peer-1
        CAP_FILTER_ENABLED: 'false'
