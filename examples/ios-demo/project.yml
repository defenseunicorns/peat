name: PeatInventory
options:
  bundleIdPrefix: com.defenseunicorns.peat
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false

targets:
  PeatInventory:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PeatInventory
        excludes:
          - "**/*.xcassets/*/Contents.json"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.defenseunicorns.peat.inventory
        INFOPLIST_FILE: PeatInventory/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        PRODUCT_NAME: "Peat Inventory"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: true
    info:
      path: PeatInventory/Resources/Info.plist

  PeatInventoryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PeatInventoryTests
    dependencies:
      - target: PeatInventory
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.defenseunicorns.peat.inventory.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Peat Inventory.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Peat Inventory"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  PeatInventory:
    build:
      targets:
        PeatInventory: all
        PeatInventoryTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: PEAT_USE_MOCK
          value: "1"
          isEnabled: true
    test:
      config: Debug
      targets:
        - PeatInventoryTests
