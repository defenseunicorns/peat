<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* HIVE Whitepaper HTML Styles
   Color scheme: (r)evolve - revolveteam.com
   Font: Space Grotesk
*/

:root {
  /* (r)evolve color palette */
  --primary-blue: #0066cc;
  --accent-blue: #3d8bff;
  --highlight-blue: #60a5fa;

  /* Dark theme (default - matches site) */
  --bg-primary: #0d0d0d;
  --bg-secondary: #1a1a1a;
  --bg-tertiary: #252525;
  --text-primary: #e0e0e0;
  --text-secondary: #b0b0b0;
  --text-muted: #6b7280;
  --border-color: rgba(0, 102, 204, 0.2);
  --grid-color: rgba(0, 102, 204, 0.03);

  /* Code */
  --code-bg: #1a1a1a;
  --code-text: #60a5fa;
}

/* Light theme alternative */
@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-tertiary: #e8e8e8;
    --text-primary: #1a1a1a;
    --text-secondary: #4b5563;
    --text-muted: #6b7280;
    --border-color: rgba(0, 102, 204, 0.15);
    --grid-color: rgba(0, 102, 204, 0.02);
    --code-bg: #f0f4f8;
    --code-text: #0066cc;
  }
}

* {
  box-sizing: border-box;
}

body {
  font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;
  line-height: 1.7;
  font-weight: 400;
  color: var(--text-primary);
  background-color: var(--bg-primary);
  background-image:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: 50px 50px;
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem;
}

/* Typography */
h1, h2, h3, h4, h5, h6 {
  font-family: "Space Grotesk", sans-serif;
  color: var(--text-primary);
  margin-top: 2rem;
  margin-bottom: 1rem;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.02em;
}

h1 {
  font-size: 2.5rem;
  font-weight: 700;
  border-bottom: 2px solid var(--primary-blue);
  padding-bottom: 0.75rem;
  margin-top: 0;
}

h2 {
  font-size: 1.75rem;
  color: var(--primary-blue);
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 0.3rem;
  margin-top: 3rem;
}

h3 {
  font-size: 1.35rem;
  color: var(--accent-blue);
}

h4 {
  font-size: 1.15rem;
  color: var(--highlight-blue);
}

/* Subtitle/tagline styling */
.subtitle {
  font-size: 1.25rem;
  font-weight: 500;
  color: var(--accent-blue);
  margin-top: -0.5rem;
}

/* Links */
a {
  color: var(--accent-blue);
  text-decoration: none;
  transition: color 0.2s ease;
}

a:hover {
  color: var(--highlight-blue);
  text-decoration: underline;
}

/* Blockquotes (Key Findings) */
blockquote {
  margin: 1.5rem 0;
  padding: 1.25rem 1.5rem;
  background: var(--bg-secondary);
  border-left: 4px solid var(--primary-blue);
  border-radius: 0 4px 4px 0;
  font-style: italic;
  color: var(--text-secondary);
}

blockquote p {
  margin: 0;
}

/* Key findings special styling */
blockquote p:first-child {
  color: var(--highlight-blue);
}

/* Tables */
table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.5rem 0;
  background: var(--bg-secondary);
  border-radius: 4px;
  overflow: hidden;
}

th, td {
  padding: 0.75rem 1rem;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
}

th {
  background: var(--bg-tertiary);
  font-weight: 600;
  color: var(--primary-blue);
  text-transform: uppercase;
  font-size: 0.85rem;
  letter-spacing: 0.05em;
}

tr:hover {
  background: var(--bg-tertiary);
}

tr:last-child td {
  border-bottom: none;
}

/* Code */
code {
  font-family: "SF Mono", "Fira Code", Consolas, monospace;
  font-size: 0.9em;
  background: var(--code-bg);
  color: var(--code-text);
  padding: 0.2em 0.4em;
  border-radius: 3px;
  border: 1px solid var(--border-color);
}

pre {
  background: var(--code-bg);
  padding: 1rem;
  border-radius: 4px;
  overflow-x: auto;
  border: 1px solid var(--border-color);
}

pre code {
  background: none;
  border: none;
  padding: 0;
  color: var(--text-primary);
}

/* Lists */
ul, ol {
  margin: 1rem 0;
  padding-left: 1.5rem;
}

li {
  margin: 0.5rem 0;
  color: var(--text-secondary);
}

li strong {
  color: var(--text-primary);
}

/* Horizontal rules */
hr {
  border: none;
  border-top: 1px solid var(--border-color);
  margin: 2.5rem 0;
}

/* Table of Contents */
nav#TOC {
  background: var(--bg-secondary);
  padding: 1.5rem 2rem;
  border-radius: 4px;
  margin-bottom: 2rem;
  border: 1px solid var(--border-color);
}

nav#TOC::before {
  content: "Contents";
  display: block;
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--primary-blue);
  margin-bottom: 1rem;
}

nav#TOC > ul {
  margin: 0;
}

nav#TOC a {
  color: var(--text-secondary);
}

nav#TOC a:hover {
  color: var(--accent-blue);
}

nav#TOC li {
  color: var(--text-muted);
}

/* Header/title area */
header {
  text-align: center;
  margin-bottom: 3rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border-color);
}

header h1.title {
  font-size: 2.75rem;
  margin-bottom: 0.5rem;
  border-bottom: none;
  color: var(--primary-blue);
}

header p.subtitle {
  font-size: 1.35rem;
  margin-bottom: 1.5rem;
  color: var(--accent-blue);
}

header p.author {
  color: var(--text-secondary);
  margin: 0.25rem 0;
}

header p.date {
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Abstract section */
section#abstract {
  background: var(--bg-secondary);
  padding: 1.5rem 2rem;
  border-radius: 4px;
  margin-bottom: 2rem;
  border-left: 4px solid var(--primary-blue);
}

section#abstract h2 {
  margin-top: 0;
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  border-bottom: none;
}

section#abstract p {
  color: var(--text-secondary);
  font-size: 0.95rem;
}

/* Print styles */
@media print {
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-tertiary: #e8e8e8;
    --text-primary: #1a1a1a;
    --text-secondary: #333333;
    --text-muted: #666666;
    --primary-blue: #0066cc;
    --accent-blue: #0066cc;
    --highlight-blue: #0066cc;
    --border-color: #cccccc;
  }

  body {
    max-width: none;
    padding: 0;
    font-size: 11pt;
    background-image: none;
  }

  h1, h2, h3 {
    page-break-after: avoid;
  }

  blockquote, table, pre {
    page-break-inside: avoid;
  }

  a {
    color: var(--text-primary);
  }

  a[href^="http"]:after {
    content: " (" attr(href) ")";
    font-size: 0.8em;
    color: #666;
  }

  nav#TOC {
    page-break-after: always;
  }

  header {
    page-break-after: always;
  }
}

/* Responsive */
@media (max-width: 768px) {
  body {
    padding: 1rem;
  }

  h1, header h1.title {
    font-size: 1.75rem;
  }

  h2 {
    font-size: 1.5rem;
  }

  table {
    font-size: 0.85rem;
  }

  th, td {
    padding: 0.5rem;
  }
}

/* Open architecture aesthetic - subtle glow effects */
h1, h2 {
  text-shadow: 0 0 30px rgba(0, 102, 204, 0.1);
}

blockquote {
  box-shadow: 0 0 20px rgba(0, 102, 204, 0.05);
}

table {
  box-shadow: 0 0 20px rgba(0, 102, 204, 0.05);
}
</style>
