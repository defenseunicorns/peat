name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Reduce debug info to save disk space on runners
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only

jobs:
  # ============================================
  # Quick checks (always run, parallel, ~3 min)
  # ============================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: clippy

      # Exclude hive-ffi: its cdylib conflicts with dittoffi symbols during linking
      # Exclude hive-inference: has platform-specific features (GStreamer, CUDA) requiring system libs
      # Exclude hive-btle: has platform-specific features (objc2 for macOS/iOS) that require Apple platforms
      - run: cargo clippy --all-targets --all-features --workspace --exclude hive-ffi --exclude hive-inference --exclude hive-btle -- -D warnings
      # Run clippy on hive-inference without optional features (no GStreamer/CUDA deps)
      - run: cargo clippy -p hive-inference --all-targets -- -D warnings
      # Run clippy on hive-btle with default features (platform features need OS-specific deps)
      - run: cargo clippy -p hive-btle --all-targets -- -D warnings

  # ============================================
  # Tests (single compile, nextest for speed)
  # PRs: all tests except E2E (~8 min)
  # Main: all tests including E2E (~10 min)
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: test

      - name: Run tests (excluding E2E for PRs)
        if: github.event_name == 'pull_request'
        env:
          HIVE_APP_ID: ${{ secrets.HIVE_APP_ID }}
          HIVE_SHARED_KEY: ${{ secrets.HIVE_SHARED_KEY }}
          HIVE_OFFLINE_TOKEN: ${{ secrets.HIVE_OFFLINE_TOKEN }}
        run: |
          cargo nextest run --all-features --workspace --exclude hive-ffi --exclude hive-inference --exclude hive-btle -E 'not test(e2e)'
          cargo nextest run -p hive-inference -E 'not test(e2e)'
          cargo nextest run -p hive-btle -E 'not test(e2e)'

      - name: Run all tests (including E2E for main)
        if: github.event_name != 'pull_request'
        env:
          HIVE_APP_ID: ${{ secrets.HIVE_APP_ID }}
          HIVE_SHARED_KEY: ${{ secrets.HIVE_SHARED_KEY }}
          HIVE_OFFLINE_TOKEN: ${{ secrets.HIVE_OFFLINE_TOKEN }}
        run: |
          cargo nextest run --all-features --workspace --exclude hive-ffi --exclude hive-inference --exclude hive-btle
          cargo nextest run -p hive-inference
          cargo nextest run -p hive-btle
