name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Reduce debug info to save disk space on runners
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only

jobs:
  # ============================================
  # Quick checks (always run, parallel, ~3 min)
  # ============================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: clippy

      # Exclude peat-ffi: UniFFI-generated cdylib has its own lint baseline
      # Exclude peat-inference: has platform-specific features (GStreamer, CUDA) requiring system libs
      - run: cargo clippy --all-targets --all-features --workspace --exclude peat-ffi --exclude peat-inference -- -D warnings
      # Run clippy on peat-inference without optional features (no GStreamer/CUDA deps)
      - run: cargo clippy -p peat-inference --all-targets -- -D warnings

  # ============================================
  # Unit & Integration Tests (excludes E2E, ~5 min)
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: test

      - name: Run unit & integration tests
        env:
          PEAT_APP_ID: ${{ secrets.PEAT_APP_ID }}
          PEAT_SHARED_KEY: ${{ secrets.PEAT_SHARED_KEY }}
        run: |
          cargo nextest run --all-features --workspace --exclude peat-ffi --exclude peat-inference -E 'not test(e2e)'
          cargo nextest run -p peat-inference -E 'not test(e2e)'

  # ============================================
  # E2E Tests (parallel job, ~3 min)
  # ============================================
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: test-e2e

      - name: Run E2E tests
        env:
          PEAT_APP_ID: ${{ secrets.PEAT_APP_ID }}
          PEAT_SHARED_KEY: ${{ secrets.PEAT_SHARED_KEY }}
        run: |
          cargo nextest run --all-features --workspace --exclude peat-ffi --exclude peat-inference -E 'test(e2e)'

  # ============================================
  # Documentation Build (#702)
  # ============================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang libdbus-1-dev
      - name: Build docs
        run: cargo doc --no-deps --workspace --exclude peat-ffi --exclude peat-inference
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ============================================
  # Feature Combinations (#699)
  # ============================================
  feature-matrix:
    name: Feature build (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "--features automerge-backend"
          - "--features lite-transport"
          - "--no-default-features --features automerge-backend"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang libdbus-1-dev
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace --exclude peat-ffi --exclude peat-inference ${{ matrix.features }}

  # ============================================
  # Security Audit
  # ============================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo generate-lockfile
      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet
      - name: Run audit (fail on vulnerabilities, warn on unmaintained)
        run: |
          cargo audit 2>&1 || true
          cargo audit --json 2>/dev/null | jq -e '.vulnerabilities.count == 0'

  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: supply-chain

      - name: Install cargo-deny and cargo-vet
        run: cargo install cargo-deny cargo-vet --quiet

      - name: Run cargo-deny
        run: cargo deny check advisories bans licenses sources

      - name: Run cargo-vet
        run: cargo vet
