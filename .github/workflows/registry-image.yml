name: Build & Publish peat-registry Image

on:
  push:
    branches: [main]
    paths:
      - 'peat-registry/**'
      - 'peat-protocol/**'
      - 'peat-schema/**'
      - '.github/workflows/registry-image.yml'
    tags:
      - 'peat-registry-v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: defenseunicorns/peat-registry

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=match,pattern=peat-registry-v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Checkout peat-mesh (patched dependency)
        uses: actions/checkout@v4
        with:
          repository: defenseunicorns/peat-mesh
          path: peat-mesh

      - name: Move repos for Docker context
        run: |
          mkdir -p /tmp/docker-ctx
          cp -a . /tmp/docker-ctx/peat
          cp -a peat-mesh /tmp/docker-ctx/peat-mesh

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: /tmp/docker-ctx
          file: /tmp/docker-ctx/peat/peat-sim/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
