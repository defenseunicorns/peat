name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'peat-ffi/**'
      - 'peat-protocol/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'peat-ffi/**'
      - 'peat-protocol/**'
      - '.github/workflows/android.yml'

env:
  CARGO_TERM_COLOR: always
  ANDROID_NDK_VERSION: "26.3.11579264"
  # Reduce debug info for smaller binaries
  CARGO_PROFILE_RELEASE_DEBUG: 0
  CARGO_PROFILE_RELEASE_LTO: thin

jobs:
  build-android:
    name: Build Android (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
            cc: aarch64-linux-android24-clang
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
            cc: armv7a-linux-androideabi24-clang
          - target: x86_64-linux-android
            abi: x86_64
            cc: x86_64-linux-android24-clang

    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Configure cargo for Android
        env:
          NDK_TOOLCHAIN: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64
        run: |
          # Add NDK toolchain bin to PATH so cc-rs can find {target}-clang
          echo "${NDK_TOOLCHAIN}/bin" >> $GITHUB_PATH

          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${NDK_TOOLCHAIN}/bin/aarch64-linux-android24-clang"
          ar = "${NDK_TOOLCHAIN}/bin/llvm-ar"

          [target.armv7-linux-androideabi]
          linker = "${NDK_TOOLCHAIN}/bin/armv7a-linux-androideabi24-clang"
          ar = "${NDK_TOOLCHAIN}/bin/llvm-ar"

          [target.x86_64-linux-android]
          linker = "${NDK_TOOLCHAIN}/bin/x86_64-linux-android24-clang"
          ar = "${NDK_TOOLCHAIN}/bin/llvm-ar"

          EOF

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: android-${{ matrix.target }}

      - name: Build peat-ffi for Android
        env:
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc }}
          AR: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: |
          cargo build -p peat-ffi --release --target ${{ matrix.target }}

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: libpeat_ffi-${{ matrix.abi }}
          path: target/${{ matrix.target }}/release/libpeat_ffi.so
          if-no-files-found: error

  generate-bindings:
    name: Generate Kotlin bindings
    runs-on: ubuntu-latest
    needs: build-android

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: bindings

      - name: Build peat-ffi (host)
        run: cargo build -p peat-ffi --release

      - name: Generate Kotlin bindings
        run: |
          cargo run -p peat-ffi --release --bin uniffi-bindgen -- \
            generate \
            --library target/release/libpeat_ffi.so \
            --language kotlin \
            --out-dir bindings/kotlin

      - name: Upload Kotlin bindings
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-bindings
          path: bindings/kotlin/
          if-no-files-found: error

  package:
    name: Package Android AAR
    runs-on: ubuntu-latest
    needs: [build-android, generate-bindings]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare JNI structure
        run: |
          mkdir -p android/jniLibs/arm64-v8a
          mkdir -p android/jniLibs/armeabi-v7a
          mkdir -p android/jniLibs/x86_64
          mkdir -p android/kotlin

          # Copy native libraries
          cp artifacts/libpeat_ffi-arm64-v8a/libpeat_ffi.so android/jniLibs/arm64-v8a/
          cp artifacts/libpeat_ffi-armeabi-v7a/libpeat_ffi.so android/jniLibs/armeabi-v7a/
          cp artifacts/libpeat_ffi-x86_64/libpeat_ffi.so android/jniLibs/x86_64/

          # Copy Kotlin bindings
          cp -r artifacts/kotlin-bindings/* android/kotlin/

          # Show structure
          echo "=== Android package structure ==="
          find android -type f

      - name: Upload complete Android package
        uses: actions/upload-artifact@v4
        with:
          name: peat-android-package
          path: android/
          if-no-files-found: error
