name: QA Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  qa-review:
    name: Peat QA Review
    if: ${{ !github.event.pull_request.draft }}
    runs-on: peat-arm64-linux-gb10
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing review
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          EXISTING=$(gh pr view "${{ github.event.pull_request.number }}" --json comments --jq \
            ".comments[] | select(.body | contains(\"Peat QA Review (SHA: ${SHORT_SHA})\")) | .id" 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Review PR with Claude Code
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat <<'PROMPT' | claude -p --allowedTools 'Bash(gh pr diff *),Bash(gh pr view *),Bash(gh pr review *)'
          You are the QA review agent for the Peat Protocol ecosystem.

          Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }} (HEAD: ${{ steps.check.outputs.short_sha }}).

          Steps:
          1. Run: gh pr diff ${{ github.event.pull_request.number }}
          2. Run: gh pr view ${{ github.event.pull_request.number }}
          3. Review the diff against these criteria:
             - Protocol/schema: backward-compatible with cap-schema; check ADR decisions
             - peat-mesh: must not break Automerge sync semantics or Iroh peer discovery
             - peat-ffi / peat-btle: FFI/BLE changes must validate all platform bindings (Android JNI, iOS UniFFI, Linux BlueZ, aarch64)
             - Security primitives: Ed25519/X25519/ChaCha20/HMAC-SHA256 — flag any deviation as [BLOCKER]
             - Performance: flag anything likely to increase convergence latency >20% or bandwidth beyond baselines
             - peat-lite: must maintain OTA safety and A/B partition integrity
             - Implementation idiom: flag code that fights the language rather than working with it
               (Rust ignoring borrow checker via excessive clone/unwrap; Go swallowing errors or building
               Java-style hierarchies; TS abusing `any`; Kotlin/Swift ignoring platform conventions).
               This is NOT formatter/style nitpicking — rustfmt/gofmt/prettier handles that.
             - Architectural reach: if a change crosses crate boundaries, alters protocol/transport
               semantics, or sits in ADR territory in a way warranting design discussion, escalate.
          4. Post findings with: gh pr review ${{ github.event.pull_request.number }} --comment --body 'YOUR_REVIEW'
             Start the body with: ## Peat QA Review (SHA: ${{ steps.check.outputs.short_sha }})
             Every finding must carry a tag with a defined action. Do NOT post optional/nice-to-have
             observations — if a finding has no clear action, omit it.
             Severity tags:
               [BLOCKER]  — must fix before merge
               [WARNING]  — should fix, may merge with justification
               [IDIOM]    — non-idiomatic implementation for the language; worth fixing, not blocking
               [ARCH]     — architectural concern requiring human design review; do NOT propose a fix, escalate
             If there are no findings under any tag, post a single line: "No findings."
             NEVER approve or request-changes — comment only.
          PROMPT
