# ContainerLab Topology: 12-Node Squad - Mode 2 (Hub-Spoke)
#
# Purpose: Realistic hierarchical structure with squad/team leaders
# Tests: Hierarchical sync, O(n log n) messaging, relay behavior
#
# Network Topology:
#   Squad Leader (soldier-1)
#     ├─ Fire Team 1 (soldiers 2-5)
#     ├─ Team Leader 2 (soldier-6)
#     │   └─ Fire Team 2 (soldiers 7-9)
#     ├─ UGV (connects to both leaders - relay)
#     └─ UAV-1
#   Team Leader 2
#     └─ UAV-2
#
# Use: make sim-deploy-squad-hierarchical

name: cap-squad-hub-spoke

topology:
  nodes:
    soldier-1:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: soldier-1
        ROLE: squad_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: writer
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
        - "12345:12345"

    soldier-2:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: soldier-2
        ROLE: rifleman
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12346"
        TCP_CONNECT: "soldier-1:12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

    soldier-3:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: soldier-3
        ROLE: grenadier
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12347"
        TCP_CONNECT: "soldier-1:12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

    soldier-4:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: soldier-4
        ROLE: automatic_rifleman
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12348"
        TCP_CONNECT: "soldier-1:12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

    soldier-5:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: soldier-5
        ROLE: rifleman
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12349"
        TCP_CONNECT: "soldier-1:12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

    soldier-6:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: soldier-6
        ROLE: team_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12350"
        TCP_CONNECT: "soldier-1:12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
        - "12350:12350"

    soldier-7:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: soldier-7
        ROLE: grenadier
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12351"
        TCP_CONNECT: "soldier-6:12350"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

    soldier-8:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: soldier-8
        ROLE: automatic_rifleman
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12352"
        TCP_CONNECT: "soldier-6:12350"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

    soldier-9:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: soldier-9
        ROLE: rifleman
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12353"
        TCP_CONNECT: "soldier-6:12350"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

    ugv-1:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: ugv-1
        ROLE: resupply_isr
        PLATFORM_TYPE: ugv
        NODE_TYPE: ugv
        MODE: reader
        TCP_LISTEN: "12354"
        TCP_CONNECT: "soldier-1:12345,soldier-6:12350"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

    uav-1:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: uav-1
        ROLE: reconnaissance
        PLATFORM_TYPE: uav
        NODE_TYPE: uav
        MODE: reader
        TCP_LISTEN: "12355"
        TCP_CONNECT: "soldier-1:12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

    uav-2:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: uav-2
        ROLE: reconnaissance
        PLATFORM_TYPE: uav
        NODE_TYPE: uav
        MODE: reader
        TCP_LISTEN: "12356"
        TCP_CONNECT: "soldier-6:12350"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
