# ContainerLab Topology: 24-Node Platoon - Traditional IoT Baseline (Client-Server)
#
# Purpose: Traditional IoT architecture comparison (NO CRDT, periodic full messages)
# Architecture: All nodes connect to central server (star topology)
# Transmission: Full state messages every 5 seconds
# Comparison: Baseline for measuring CRDT overhead and CAP filtering benefits
#
# Network: All nodes → platoon-leader (centralized)
# Structure: 1 platoon leader + 3 squad leaders + 20 squad members = 24 nodes
# Use: containerlab deploy -t topologies/traditional-platoon-24node.yaml

name: traditional-platoon-24node

topology:
  nodes:
    # Central Server
    platoon-leader:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: platoon-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        MODE: writer
        TCP_LISTEN: "12345"
        USE_TRADITIONAL: "true"
        UPDATE_FREQUENCY_SECS: "0.5"
        NODE_TYPE: server
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
        - "12345:12345"

    # Squad Leaders (clients)
    squad-alpha-leader:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: squad-alpha-leader
        ROLE: squad_leader
        PLATFORM_TYPE: soldier
        MODE: reader
        TCP_CONNECT: "platoon-leader:12345"
        USE_TRADITIONAL: "true"
        UPDATE_FREQUENCY_SECS: "0.5"
        NODE_TYPE: client
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

