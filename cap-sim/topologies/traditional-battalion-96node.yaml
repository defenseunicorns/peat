# ContainerLab Topology: 96-Node Battalion - Traditional IoT Baseline
# Architecture: All nodes connect to central server (star topology)
# Transmission: Full state messages every 0.5 seconds (2Hz)

name: traditional-battalion-96node
topology:
  nodes:
    battalion-hq:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: battalion-hq
        ROLE: battalion_commander
        PLATFORM_TYPE: soldier
        MODE: writer
        TCP_LISTEN: '12345'
        USE_TRADITIONAL: 'true'
        UPDATE_FREQUENCY_SECS: '0.5'
        NODE_TYPE: server
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
      - 12345:12345
    p1-soldier-1:
      kind: linux
      image: cap-sim-node:latest
      env:
        NODE_ID: p1-soldier-1
        ROLE: rifleman
        PLATFORM_TYPE: soldier
        MODE: reader
        TCP_CONNECT: battalion-hq:12345
        USE_TRADITIONAL: 'true'
        UPDATE_FREQUENCY_SECS: '0.5'
        NODE_TYPE: client
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
