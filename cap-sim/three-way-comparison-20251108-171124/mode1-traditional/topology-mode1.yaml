# ContainerLab Topology: 24-Node Platoon - Client-Server Mode
#
# Purpose: Phase 3A - First multi-squad hierarchical test
# Architecture: All nodes connect to platoon-leader (star topology)
# Scale: 2× squad (12 → 24 nodes)
#
# Structure:
#   Platoon Leader (1)
#   ├── Squad Alpha Leader (1) + 6 members = 7 nodes
#   ├── Squad Bravo Leader (1) + 6 members = 7 nodes
#   └── Squad Charlie Leader (1) + 6 members = 7 nodes
#   Total: 1 platoon leader + 21 squad members = 24 nodes
#
# Network: All nodes → platoon-leader (central aggregation)

name: cap-platoon-client-server

topology:
  nodes:
    # Platoon Leader (central server, all nodes connect here)
    platoon-leader:
      kind: linux
      image: cap-sim-node:latest
        USE_TRADITIONAL: "true"
      env:
        NODE_ID: platoon-leader
        ROLE: platoon_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: writer
        UPDATE_RATE_MS: "5000"
        TCP_LISTEN: "12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}
      ports:
        - "12345:12345"

    # Squad Alpha (7 members)
    squad-alpha-leader:
      kind: linux
      image: cap-sim-node:latest
        USE_TRADITIONAL: "true"
      env:
        NODE_ID: squad-alpha-leader
        ROLE: squad_leader
        PLATFORM_TYPE: soldier
        NODE_TYPE: soldier
        MODE: reader
        TCP_LISTEN: "12346"
        TCP_CONNECT: "platoon-leader:12345"
        DITTO_APP_ID: ${DITTO_APP_ID}
        DITTO_OFFLINE_TOKEN: ${DITTO_OFFLINE_TOKEN}
        DITTO_SHARED_KEY: ${DITTO_SHARED_KEY}

